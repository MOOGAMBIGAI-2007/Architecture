<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Northstar Studio — a modern, fast e-commerce catalog experience." />
    <title>Northstar Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="#/" aria-label="Northstar Studio home">
          <span>Northstar</span> Studio
        </a>
        <nav class="nav" aria-label="Primary navigation">
          <a href="#/" data-link>Home</a>
          <a href="#/shop" data-link>Shop</a>
          <a href="#/about" data-link>About</a>
          <a href="#/contact" data-link>Contact</a>
        </nav>
        <a class="cart-pill" href="#/shop">Cart <span id="cartCount">0</span></a>
      </header>

      <main id="app" class="app" aria-live="polite"></main>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
